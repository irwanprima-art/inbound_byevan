services:
  # ─── Go + React Application ───
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inbound-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - DB_DRIVER=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-inbound_user}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-inbound_pass}
      - DB_NAME=${POSTGRES_DB:-inbound_db}
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-strong-random-secret}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8070}
      - GIN_MODE=release
      - CLOCK_ALLOWED_CIDRS=${CLOCK_ALLOWED_CIDRS:-192.168.6.0/24,192.168.0.0/24,172.16.0.0/12,127.0.0.0/8}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin123}
      - MINIO_BUCKET=${MINIO_BUCKET:-unboxing-videos}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-false}
    networks:
      - inbound-net

  # ─── Nginx Reverse Proxy ───
  nginx:
    image: nginx:alpine
    container_name: inbound-nginx
    restart: unless-stopped
    ports:
      - "8070:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - inbound-net

  # ─── PostgreSQL Database ───
  postgres:
    image: postgres:16-alpine
    container_name: inbound-postgres
    restart: unless-stopped
    ports:
      - "5454:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-inbound_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-inbound_pass}
      - POSTGRES_DB=${POSTGRES_DB:-inbound_db}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-inbound_user} -d $${POSTGRES_DB:-inbound_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - inbound-net

  # ─── MinIO Object Storage (Unboxing Videos) ───
  minio:
    image: minio/minio:latest
    container_name: inbound-minio
    restart: unless-stopped
    ports:
      - "9090:9000"
      - "9091:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - inbound-net

volumes:
  pg-data:
    driver: local
  minio-data:
    driver: local

networks:
  inbound-net:
    driver: bridge
